---
- name: Install MetalLB
  ansible.builtin.shell: |
    kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.5/config/manifests/metallb-native.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_install
  changed_when: "'created' in metallb_install.stdout or 'configured' in metallb_install.stdout"

- name: Copy MetalLB L2 manifest
  ansible.builtin.template:
    src: metallb-l2.yml.j2
    dest: /tmp/metallb-l2.yml
    mode: "0644"

- name: Copy MetalLB IP pool manifest
  ansible.builtin.template:
    src: metallb-pool.yml.j2
    dest: /tmp/metallb-pool.yml
    mode: "0644"

- name: Wait for MetalLB pods to be ready
  ansible.builtin.command: >
    kubectl wait --namespace metallb-system
    --for=condition=Ready pod
    --all
    --timeout=180s
  changed_when: false

- name: Apply MetalLB IP pool
  ansible.builtin.shell: |
    kubectl apply -f /tmp/metallb-pool.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_pool_apply
  changed_when: "'created' in metallb_pool_apply.stdout or 'configured' in metallb_pool_apply.stdout"

- name: Apply MetalLB L2Advertisement
  ansible.builtin.shell: |
    kubectl apply -f /tmp/metallb-l2.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_l2_apply
  changed_when: "'created' in metallb_l2_apply.stdout or 'configured' in metallb_l2_apply.stdout"
