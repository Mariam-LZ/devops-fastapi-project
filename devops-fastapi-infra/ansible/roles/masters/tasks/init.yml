---
- name: Generate kubeadm init configuration
  ansible.builtin.template:
    src: kubeadm-init.yml.j2
    dest: /tmp/kubeadm-init.yaml
    mode: "0644"

# creates prevents re-running kubeadm init on already initialized nodes.
- name: Initialize Kubernetes control plane
  ansible.builtin.command: kubeadm init --config=/tmp/kubeadm-init.yaml
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create kubeconfig directory for debian user
  ansible.builtin.file:
    path: /home/debian/.kube
    state: directory
    owner: debian
    group: debian
    mode: "0700"
  when: inventory_hostname == groups['masters'][0]

# Allow cluster administration with kubectl from the debian user account.
- name: Copy admin kubeconfig for debian user
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/debian/.kube/config
    owner: debian
    group: debian
    mode: "0600"
    remote_src: true
  when: inventory_hostname == groups['masters'][0]

- name: Create root kubeconfig directory
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"

- name: Check Calico installation
  ansible.builtin.command: kubectl get pods -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: masters_calico_check
  changed_when: false
  failed_when: false

# Calico provides Kubernetes pod networking and network policy support.
- name: Install Calico CNI
  ansible.builtin.command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: "'calico' not in masters_calico_check.stdout"
  changed_when: true

# Worker nodes use this command to join the cluster.
- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: masters_worker_join_command
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Store worker join command
  ansible.builtin.set_fact:
    masters_kubeadm_worker_join_command: "{{ masters_worker_join_command.stdout }}"
  when: inventory_hostname == groups['masters'][0]

# Additional control plane nodes require a certificate key
# to securely join the HA control plane.
- name: Generate certificate key for additional control planes
  ansible.builtin.shell: |
    set -o pipefail
    kubeadm init phase upload-certs --upload-certs | tail -1
  args:
    executable: /bin/bash
  register: masters_certificate_key
  changed_when: false

- name: Generate control plane join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: masters_control_plane_join_base_command
  changed_when: false

# Store the full join command used by additional master nodes.
- name: Store control plane join command
  ansible.builtin.set_fact:
    masters_kubeadm_control_plane_join_command: >-
      {{ masters_control_plane_join_base_command.stdout }}
      --control-plane
      --certificate-key {{ masters_certificate_key.stdout }}
  when: inventory_hostname == groups['masters'][0]
