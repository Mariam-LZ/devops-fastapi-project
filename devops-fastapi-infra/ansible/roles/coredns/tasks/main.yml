---
- name: Configure CoreDNS internal override for ACME self-check
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: coredns
        namespace: kube-system
      data:
        Corefile: |
          .:53 {
              errors
              health {
                 lameduck 5s
              }
              ready
              kubernetes cluster.local in-addr.arpa ip6.arpa {
                 pods insecure
                 fallthrough in-addr.arpa ip6.arpa
                 ttl 30
              }
              hosts {
                  {% for item in coredns_host_overrides %}
                  {{ item.ip }} {{ item.host }}
                  {% endfor %}
                  fallthrough
              }
              prometheus :9153
              forward . /etc/resolv.conf {
                 max_concurrent 1000
              }
              cache 30
              loop
              reload
              loadbalance
          }

- name: Restart CoreDNS
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    api_version: apps/v1
    kind: Deployment
    namespace: kube-system
    name: coredns
    definition:
      spec:
        template:
          metadata:
            annotations:
              coredns-restarted-at: "{{ ansible_date_time.iso8601 }}"