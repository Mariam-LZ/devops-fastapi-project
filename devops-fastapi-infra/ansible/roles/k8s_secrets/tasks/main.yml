---
# Store backend application secrets separately from manifests.
- name: Create backend application secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fastapi-app-backend-secret
        namespace: "{{ item }}"
      type: Opaque
      stringData:
        SECRET_KEY: "{{ vault_backend_secret_key }}"
        POSTGRES_PASSWORD: "{{ vault_postgres_app_password }}"
        FIRST_SUPERUSER: "{{ vault_first_superuser }}"
        FIRST_SUPERUSER_PASSWORD: "{{ vault_first_superuser_password }}"
  loop:
    - dev
    - prod

# # Store PostgreSQL credentials separately from application manifests.
- name: Create PostgreSQL secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: fastapi-postgres-secret
        namespace: "{{ item }}"
      type: Opaque
      stringData:
        postgres-password: "{{ vault_postgres_admin_password }}"
        password: "{{ vault_postgres_app_password }}"
  loop:
    - dev
    - prod

# # Allows Kubernetes to pull private images from the GitLab registry.
- name: Create GitLab registry pull secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-registry
        namespace: "{{ item }}"
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {{
            {
              "auths": {
                 "registry.gitlab.com": {
                   "username": vault_gitlab_registry_username,
                   "password": vault_gitlab_registry_password,
                   "auth": (vault_gitlab_registry_username ~ ":" ~ vault_gitlab_registry_password) | b64encode
                  }
              }
            } | to_json | b64encode
          }}
  loop:
    - dev
    - prod
    - argocd

# # Used by ArgoCD Image Updater to push image tag updates
# # back to the GitOps repository.
- name: Create ArgoCD Image Updater Git credentials secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-image-updater-git-creds
        namespace: argocd
      type: Opaque
      stringData:
        username: "{{ vault_gitlab_image_updater_username }}"
        password: "{{ vault_gitlab_image_updater_token }}"

- name: Create ArgoCD Git repository secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-manifest-repo
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      type: Opaque
      stringData:
        type: git
        url: https://gitlab.com/devops-glmt/devops-fastapi-manifest.git
        username: "{{ vault_gitlab_image_updater_username }}"
        password: "{{ vault_gitlab_image_updater_token }}"
  no_log: true