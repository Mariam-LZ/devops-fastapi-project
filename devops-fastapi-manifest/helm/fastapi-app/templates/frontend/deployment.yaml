{{- if .Values.frontend.enabled }}
# Deploy the frontend application pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  {{- if not .Values.frontend.autoscaling.enabled }}
  # Fixed replica count is only used when autoscaling is disabled.
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}

  selector:
    matchLabels:
      # Must match the labels defined in the pod template.
      {{- include "fastapi-app.frontend.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "fastapi-app.frontend.selectorLabels" . | nindent 8 }}

    spec:
      {{- with .Values.global.imagePullSecrets }}
      # Required to pull private frontend images from the GitLab Container Registry.
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add: 
                - CHOWN
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP

          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

          # Readiness controls when the pod can receive traffic.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          # Liveness restarts the pod if the frontend becomes unhealthy.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
{{- end }}