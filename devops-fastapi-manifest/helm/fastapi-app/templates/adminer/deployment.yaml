{{- if .Values.adminer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-adminer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-app
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: adminer

  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-app
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: adminer

    spec:
      containers:
        - name: adminer
          image: "{{ .Values.adminer.image.repository }}:{{ .Values.adminer.image.tag }}"
          imagePullPolicy: {{ .Values.adminer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: {{ .Values.adminer.service.port }}
              protocol: TCP

          resources:
            {{- toYaml .Values.adminer.resources | nindent 12 }}
{{- end }}