{{- if .Values.adminer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-adminer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
spec:
  type: {{ .Values.adminer.service.type }}

  ports:
    - name: http
      port: {{ .Values.adminer.service.port }}
      targetPort: http
      protocol: TCP

  selector:
    app.kubernetes.io/name: fastapi-app
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: adminer
{{- end }}