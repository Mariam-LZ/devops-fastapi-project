{{- if and .Values.backend.enabled .Values.backend.serviceAccount.create }}
# ServiceAccount used by the backend pods.
# It can be extended later with RBAC rules if the backend needs Kubernetes API access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

# Keep this disabled if the backend does not need to access the Kubernetes API.
automountServiceAccountToken: {{ .Values.backend.serviceAccount.automount }}
{{- end }}