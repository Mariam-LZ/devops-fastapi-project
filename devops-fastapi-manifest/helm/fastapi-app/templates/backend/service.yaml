{{- if .Values.backend.enabled }}
# Expose the backend pods inside the cluster.
# The Ingress routes API traffic to this Service when enabled.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}

  ports:
    # Named "http" so ServiceMonitor, Ingress, and probes can target it consistently.
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP

  selector:
    # Must match the labels used by the backend Deployment pods.
    {{- include "fastapi-app.backend.selectorLabels" . | nindent 4 }}
{{- end }}